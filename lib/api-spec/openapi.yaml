          type: integer
        storeId:
          type: integer
        invoiceNumber:
          type: ["string", "null"]
        poNumber:
          type: ["string", "null"]
        deliveryNoteNumber:
          type: ["string", "null"]
        receivedDate:
          type: string
        vatApplicable:
          type: boolean
        notes:
          type: ["string", "null"]
        storeManagerName:
          type: ["string", "null"]
        approverSignatureName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/GrnItem"

    GrnUpdate:
      type: object
      properties:
        invoiceNumber:
          type: ["string", "null"]
        poNumber:
          type: ["string", "null"]
        deliveryNoteNumber:
          type: ["string", "null"]
        receivedDate:
          type: string
        vatApplicable:
          type: boolean
        notes:
          type: ["string", "null"]
        storeManagerName:
          type: ["string", "null"]
        approverSignatureName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/GrnItem"

    ApprovalAction:
      type: object
      properties:
        notes:
          type: ["string", "null"]

    # TRANSFER
    TransferItem:
      type: object
      required: [productId, requestedQty]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        requestedQty:
          type: number
        approvedQty:
          type: ["number", "null"]
        shippedQty:
          type: ["number", "null"]
        receivedQty:
          type: ["number", "null"]

    Transfer:
      type: object
      required: [id, transferNumber, fromStoreId, toStoreId, status, createdAt]
      properties:
        id:
          type: integer
        transferNumber:
          type: string
        fromStoreId:
          type: integer
        fromStoreName:
          type: ["string", "null"]
        toStoreId:
          type: integer
        toStoreName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, shipped, received]
        notes:
          type: ["string", "null"]
        requestedById:
          type: ["integer", "null"]
        approvedById:
          type: ["integer", "null"]
        shippedAt:
          type: ["string", "null"]
        receivedAt:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
        items:
