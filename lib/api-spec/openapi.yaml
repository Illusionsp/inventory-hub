components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # USER
    User:
      type: object
      required: [id, name, email, role, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_admin, store_manager, production_manager, sales_officer, finance_officer, approver]
        storeId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        permissions:
          type: array
          items:
            type: string
          nullable: true
          description: "Explicit permission overrides. null = use role-based defaults."
        createdAt:
          type: string

    UserList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
        storeId:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        storeId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        permissions:
          type: array
          items:
            type: string
          nullable: true
          description: "Explicit permission overrides. null = use role-based defaults."

    # STORE
    Store:
      type: object
      required: [id, name, type, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [main_raw_material, semi_finished, final_production, main_finished]
        location:
          type: ["string", "null"]
        isActive:
          type: boolean
        managerId:
          type: ["integer", "null"]

    StoreInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        location:
          type: ["string", "null"]
        managerId:
          type: ["integer", "null"]

    StoreUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: ["string", "null"]
        isActive:
          type: boolean
        managerId:
          type: ["integer", "null"]

    # CATEGORY
    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]

    # PRODUCT
    Product:
      type: object
      required: [id, name, type, unit, reorderLevel, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: ["string", "null"]
        type:
          type: string
          enum: [raw_material, semi_finished, finished, packaging]
        unit:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        reorderLevel:
          type: number
        unitCost:
          type: ["number", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    ProductList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductInput:
      type: object
      required: [name, type, unit]
      properties:
        name:
          type: string
        sku:
          type: ["string", "null"]
        type:
          type: string
        unit:
          type: string
        categoryId:
          type: ["integer", "null"]
        reorderLevel:
          type: number
        unitCost:
          type: ["number", "null"]

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        sku:
          type: ["string", "null"]
        type:
          type: string
        unit:
          type: string
        categoryId:
          type: ["integer", "null"]
        reorderLevel:
          type: number
        unitCost:
          type: ["number", "null"]
        isActive:
          type: boolean

    # SUPPLIER
    Supplier:
      type: object
      required: [id, name, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contactPerson:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    SupplierList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Supplier"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    SupplierInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        contactPerson:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]

    SupplierUpdate:
      type: object
      properties:
        name:
          type: string
        contactPerson:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        isActive:
          type: boolean

    # CUSTOMER
    Customer:
      type: object
      required: [id, name, type, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [company, walk_in]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
