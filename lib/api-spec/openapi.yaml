        page:
          type: integer
        limit:
          type: integer

    CustomerInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        isActive:
          type: boolean

    CustomerStatement:
      type: object
      required: [customer, totalSales, totalPaid, outstandingBalance, sales]
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
        totalSales:
          type: number
        totalPaid:
          type: number
        outstandingBalance:
          type: number
        sales:
          type: array
          items:
            $ref: "#/components/schemas/Sale"

    # GRN
    GrnItem:
      type: object
      required: [quantity, unit, unitCost, totalCost]
      properties:
        id:
          type: integer
        itemName:
          type: ["string", "null"]
        productId:
          type: ["integer", "null"]
        quantity:
          type: number
        unit:
          type: string
        unitCost:
          type: number
        totalCost:
          type: number
        batchNumber:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]

    Grn:
      type: object
      required: [id, grnNumber, status, supplierId, storeId, receivedDate, totalCost, createdAt]
      properties:
        id:
          type: integer
        grnNumber:
          type: string
        status:
          type: string
          enum: [draft, pending_approval, approved, rejected, paid]
        supplierId:
          type: integer
        supplierName:
          type: ["string", "null"]
        storeId:
          type: integer
        storeName:
          type: ["string", "null"]
        invoiceNumber:
          type: ["string", "null"]
        poNumber:
          type: ["string", "null"]
        deliveryNoteNumber:
          type: ["string", "null"]
        receivedDate:
          type: string
        totalCost:
          type: number
        vatApplicable:
          type: boolean
        vatAmount:
          type: number
        notes:
          type: ["string", "null"]
        storeManagerName:
          type: ["string", "null"]
        approverSignatureName:
          type: ["string", "null"]
        approvedById:
          type: ["integer", "null"]
        approverName:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
        items:
